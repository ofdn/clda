<iframe id="slideFrame" style="width:{{with .Get "width"}}{{.}}{{else}}100%{{end}};height:{{with .Get "height"}}{{.}}{{else}}30em{{end}};border:0"></iframe>

<div id="slideContent" style="display:none">
  <link rel="stylesheet" href="{{"revealjs/css/reveal.css"|absURL}}">
  <link rel="stylesheet" href="{{"revealjs/css/theme/"|absURL}}{{with .Get "theme"}}{{.|safeHTML}}{{else}}league{{end}}.css">
  <link rel="stylesheet" href="{{"revealjs/lib/css/zenburn.css"|absURL}}">
  <div class="reveal">
    <div class="slides">
      <section data-markdown
               data-separator="^\n---\n"
               data-separator-vertical="^\n___\n"
               data-separator-notes="^Note:"
               data-charset="utf8">
        <script type="text/template">{{ .Inner }}</script>
      </section>
    </div>
  </div>
  <script src="{{"revealjs/lib/js/head.min.js"|absURL}}"></script>
  <script src="{{"revealjs/js/reveal.js"|absURL}}"></script>
  <script>
  function initSlides() {
    Reveal.initialize({
      embedded: true,
      controls: {{with .Get "controls"}}{{.|safeHTML}}{{else}}false{{end}},
      center: {{with .Get "center"}}{{.|safeHTML}}{{else}}true{{end}},
      history: {{with .Get "history"}}{{.|safeHTML}}{{else}}false{{end}},
      progress: {{with .Get "progress"}}{{.|safeHTML}}{{else}}false{{end}},
      transition: "{{with .Get "transition"}}{{.}}{{else}}concave{{end}}",
      dependencies: [
        { src: '{{"revealjs/lib/js/classList.js"|absURL}}', condition: function() { return !document.body.classList; } },
        { src: '{{"revealjs/plugin/markdown/marked.js"|absURL}}', condition: function() { return !!document.querySelector("[data-markdown]"); } },
        { src: '{{"revealjs/plugin/markdown/markdown.js"|absURL}}', condition: function() { return !!document.querySelector("[data-markdown]"); } },
        { src: '{{"revealjs/plugin/highlight/highlight.js"|absURL}}', async: true, callback: function() { hljs.initHighlightingOnLoad(); } },
        { src: '{{"revealjs/plugin/zoom-js/zoom.js"|absURL}}', async: true, condition: function() { return !!document.body.classList; } },
        { src: '{{"revealjs/plugin/notes/notes.js"|absURL}}', async: true, condition: function() { return !!document.body.classList; } }
      ]
    });
  }
  </script>
</div>

<li><a href="#" onclick="slideFullScreen();">See it fullscreen</a></li>

<script>
var slideHTML = document.getElementById('slideContent').innerHTML;
document.getElementById('slideContent').remove();

var frame = document.getElementById('slideFrame');
frame.srcdoc = '<!DOCTYPE html><html><head></head><body>' + slideHTML + '</body></html>';

frame.addEventListener('load', function() {
  waitForReveal();
});

function waitForReveal() {
  try {
    if (frame.contentWindow && frame.contentWindow.Reveal) {
      frame.contentWindow.initSlides();
      return;
    }
  } catch(e) {}
  setTimeout(waitForReveal, 100);
}

function slideFullScreen() {
  var win = window.open('', '_blank');
  win.document.write('<!DOCTYPE html><html><head></head><body>' + slideHTML + '</body></html>');
  win.document.close();
}
</script>
