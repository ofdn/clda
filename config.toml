baseURL = "https://ofdn.github.io/clda/"
languageCode = "en-us"
DefaultContentLanguage = "en"
title = "CLDA-Community language documentation and archiving Training"
theme = "docdock"
pygmentsCodeFences = true
pygmentsStyle = "monokailight"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir= false
enableMissingTranslationPlaceholders = false


# Content translations go in content/<page>.<lang>.md (e.g. _index.fr.md, _index.hi.md).
# UI string translations go in i18n/fr.toml and i18n/hi.toml.

[Languages]
  [Languages.en]
  title = "CLDA Training"
  weight = 1
  languageName = "English"

  [Languages.fr]
  title = "Formation CLDA"
  weight = 2
  languageName = "Français"

  [Languages.hi]
  title = "CLDA प्रशिक्षण"
  weight = 3
  languageName = "हिन्दी"

[minify]
  disableHTML = true

[params]
editURL = "https://github.com/ofdn/clda/edit/main/content/"
showVisitedLinks = true # default is false
themeStyle = "flex" # "original" or "flex" # default "flex"
themeVariant = "" # choose theme variant "green", "gold" , "gray", "blue" (default)
ordersectionsby = "weight" # ordersectionsby = "title"
disableHomeIcon = true # default is false
disableSearch = false # default is false
disableNavChevron = false # set true to hide next/prev chevron, default is false
highlightClientSide = false # set true to use highlight.pack.js instead of the default hugo chroma highlighter
menushortcutsnewtab = false # set true to open shortcuts links to a new tab/window
enableGitInfo = false

[outputs]
home = [ "HTML", "RSS", "JSON"]


[[menu.shortcuts]]
name = "<i class='fa fa-home'></i> <label>Home</label>"
url = "/"
weight = 9

[[menu.shortcuts]]
pre = "<h3>Fork it in Github</h3>"
name = "<i class='fa fa-github'></i> <label>Contribute</label>"
identifier = "ds"
url = "/contribute"
weight = 10

